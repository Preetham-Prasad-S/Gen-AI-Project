<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <header>
                <h2>History</h2>
                <button id="new-chat-btn">+ New Chat</button>
            </header>
            <div id="session-list" class="session-list">
                <!-- Session items will be injected here -->
            </div>
        </aside>

        <main class="chat-container">
            <header>
                <div>
                    <h1 id="chat-title">AI Assistant</h1>
                </div>
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                    <button id="summarize-btn" class="secondary-btn" style="display: none;">Summarize Chat</button>
                    <div class="status">
                        <span class="status-dot"></span>
                        <span class="status-text">Llama 3 Powered</span>
                    </div>
                </div>
            </header>

        <div id="chat-messages" class="chat-messages">
            <div class="message ai">
                <div class="content">Hello! How can I help you today?</div>
            </div>
        </div>

        <form id="chat-form" class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button type="submit" id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
