<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curator | AI Chat</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-dark text-white">
    <div class="d-flex vh-100 overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar d-flex flex-column p-3">
            <div class="sidebar-header mb-4 px-2">
                <h2 class="h5 fw-bold mb-0">The Curator</h2>
                <small class="text-secondary fw-bold">PREMIUM TIER</small>
            </div>

            <nav class="nav flex-column mb-auto">
                <button id="new-chat-btn" class="nav-link text-secondary mb-2 d-flex align-items-center bg-transparent border-0 text-start w-100 px-2 py-2 rounded">
                    <i class="bi bi-plus-circle me-3"></i> New Curation
                </button>
                <div class="nav-section-label px-2 mt-3 mb-2 small fw-bold text-secondary">
                    <i class="bi bi-clock-history me-2"></i> Conversation History
                </div>
                <div id="session-list" class="session-list px-0">
                    <!-- Session items will be injected here -->
                </div>
            </nav>

            <div class="sidebar-footer mt-auto pt-3 border-top border-secondary">
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-grow-1 d-flex flex-column">
            <!-- Header -->
            <header class="main-header d-flex align-items-center justify-content-end px-4 py-3 border-bottom border-secondary">
            </header>

            <!-- Chat Area -->
            <div class="chat-wrapper flex-grow-1 d-flex">
                <div class="chat-main flex-grow-1 p-4 overflow-y-auto">
                    <div class="chat-content-max-width mx-auto" style="max-width: 800px;">
                        <div class="chat-title-section mb-5">
                            <h1 id="chat-title" class="display-6 fw-bold mb-1">AI Assistant</h1>
                            <p id="chat-metadata" class="text-secondary small">Exploration initiated • Session ID: #NEW</p>
                        </div>
                        
                        <div id="chat-messages" class="chat-messages d-flex flex-column gap-4 pb-5">
                            <!-- Messages will be injected here -->
                        </div>
                    </div>
                </div>

                <!-- Right Sidebar (Conversation Summary) -->
                <aside class="right-sidebar d-none d-xl-flex flex-column p-4 border-start border-secondary" style="width: 320px;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h6 class="small fw-bold text-uppercase tracking-wider m-0">Conversation Summary</h6>
                        <i class="bi bi-three-dots"></i>
                    </div>
                    <div id="summary-content" class="flex-grow-1 overflow-y-auto">
                        <!-- Summary content or placeholders -->
                        <div class="summary-placeholder text-secondary small">
                            <p>Send messages to generate a summary.</p>
                        </div>
                    </div>
                    <div class="sidebar-actions mt-4 d-grid gap-2">
                        <button id="summarize-btn" class="btn btn-indigo text-white fw-bold py-2 shadow-sm">SUMMARIZE CHAT</button>
                        <button class="btn btn-outline-secondary text-white fw-bold py-2">CREATE DIGEST</button>
                    </div>
                </aside>
            </div>

            <!-- Input Area -->
            <div class="input-container p-4">
                <form id="chat-form" class="chat-input-bar d-flex align-items-center bg-dark-input border border-secondary rounded-pill px-3 py-2 mx-auto" style="max-width: 800px;">
                    <button type="button" class="btn btn-link text-secondary p-2">
                        <i class="bi bi-paperclip fs-5"></i>
                    </button>
                    <input type="text" id="user-input" class="form-control border-0 bg-transparent text-white py-2" placeholder="Add to the curation..." autocomplete="off">
                    <button type="submit" id="send-btn" class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-2 ms-2" style="width: 40px; height: 40px;">
                        <i class="bi bi-arrow-up-short fs-4"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
